<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بەشی داهاتوو (ڕاهێنانەکانی زمانی کوردی)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#E7F0EA; --paper:#FFFFFF; --ink:#1E3A30; --ink-soft:#557167;
    --green:#0F6B4F; --green-deep:#0A4A37; --gold:#F2A516; --gold-line:#F6C760;
    --line:#D8E5DD; --shadow-sm:0 4px 14px -8px rgba(10,74,55,.30); --radius:18px;
  }
  *{box-sizing:border-box}
  body{ margin:0; font-family:'Vazirmatn','Noto Naskh Arabic','Segoe UI',Tahoma,sans-serif; color:var(--ink);
    background-color:var(--bg); background-image:radial-gradient(rgba(15,107,79,.07) 1.1px, transparent 1.1px);
    background-size:22px 22px; line-height:1.85; -webkit-font-smoothing:antialiased; }
  .appbar{ position:sticky; top:0; z-index:40; background:linear-gradient(135deg,var(--green) 0%, var(--green-deep) 100%);
    color:#fff; box-shadow:0 8px 24px -10px rgba(10,74,55,.55); border-bottom:3px solid var(--gold); overflow:hidden; }
  .appbar::after{ content:""; position:absolute; width:200px; height:200px; right:-70px; top:-90px;
    background:conic-gradient(from 0deg, rgba(246,199,96,.0) 0deg, rgba(246,199,96,.0) 14deg, rgba(246,199,96,.22) 18deg, rgba(246,199,96,.0) 22deg);
    border-radius:50%; pointer-events:none; }
  .appbar-inner{max-width:920px; margin:0 auto; padding:16px 20px; display:flex; align-items:center; gap:16px; flex-wrap:wrap; position:relative;}
  .brand{display:flex; align-items:center; gap:14px; margin-inline-end:auto;}
  .brand h1{font-size:1.25rem; font-weight:900; margin:0;}
  .sun-badge{ width:40px;height:40px;border-radius:50%; background:radial-gradient(circle at 50% 45%, #FFD969, var(--gold) 70%);
    box-shadow:0 0 0 4px rgba(255,217,105,.20), 0 0 18px rgba(246,199,96,.5); flex:none; }
  .icon-btn{ background:rgba(255,255,255,.14); color:#fff; border:1px solid rgba(255,255,255,.28);
    padding:8px 16px; border-radius:999px; font-family:inherit; font-size:.86rem; font-weight:600;
    text-decoration:none; transition:background .15s; }
  .icon-btn:hover{background:rgba(255,255,255,.26)}
  main{max-width:920px; margin:0 auto; padding:60px 18px 70px; text-align:center;}
  .card{ background:var(--paper); border:1px solid var(--line); border-radius:var(--radius);
    box-shadow:var(--shadow-sm); padding:44px 24px; }
  .card .sun-emoji{font-size:2.4rem;}
  .card h2{color:var(--green-deep); font-size:1.3rem; margin:10px 0 8px;}
  .card p{color:var(--ink-soft); margin:0;}
</style>
</head>
<body>
<header class="appbar">
  <div class="appbar-inner">
    <div class="brand">
      <div class="sun-badge" aria-hidden="true"></div>
      <h1>زیاتر لە ڕێزمان</h1>
    </div>
    <a href="class-1.html" class="icon-btn">→ گەڕانەوە بۆ وانەکان</a>
  </div>
</header>
<main>
  <div class="card">
    <div class="sun-emoji">🌅</div>
    <h2>ئەم بەشە بەم زووانە زیاددەکرێت</h2>
    <p>وانەی داهاتووی ڕێزمان لێرە دادەنرێت کاتێک ئامادە بێت.</p>
  </div>
</main>
</body>
</html>
